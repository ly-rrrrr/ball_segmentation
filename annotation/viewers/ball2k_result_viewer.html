<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2K 小球分割结果查看器</title>
  <style>
    :root { color-scheme: light; --bg:#f5f7fb; --panel:#fff; --border:#d9e0ec; --text:#18202f; --muted:#657086; --blue:#1769e0; --blue-soft:#e8f1ff; --shadow:0 8px 22px rgba(24,32,47,.08); --img-width:100%; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family:Arial,"Microsoft YaHei",sans-serif; }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; min-height:64px; padding:10px 18px; border-bottom:1px solid var(--border); background:var(--panel); box-shadow:var(--shadow); }
    h1 { margin:0; font-size:18px; font-weight:700; letter-spacing:0; }
    .toolbar { display:flex; align-items:center; justify-content:flex-end; gap:10px; flex-wrap:wrap; }
    .toolbar label { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; }
    select, button { height:34px; border:1px solid var(--border); border-radius:6px; background:#fff; color:var(--text); font:inherit; font-size:13px; }
    select { min-width:220px; padding:0 32px 0 10px; }
    button { min-width:38px; padding:0 10px; cursor:pointer; }
    button:hover, select:hover { border-color:#8fb6ee; }
    .main { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; height:calc(100vh - 64px); padding:12px; }
    .pane { display:flex; min-width:0; min-height:0; flex-direction:column; overflow:hidden; border:1px solid var(--border); border-radius:8px; background:var(--panel); box-shadow:var(--shadow); }
    .pane-head { display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:48px; padding:10px 12px; border-bottom:1px solid var(--border); }
    .pane-title { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-size:14px; font-weight:700; }
    .badge { flex:0 0 auto; padding:4px 8px; border-radius:999px; background:var(--blue-soft); color:var(--blue); font-size:12px; font-weight:700; }
    .image-wrap { flex:1; min-height:0; overflow:auto; background:linear-gradient(45deg,#f0f3f8 25%,transparent 25%),linear-gradient(-45deg,#f0f3f8 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#f0f3f8 75%),linear-gradient(-45deg,transparent 75%,#f0f3f8 75%); background-size:24px 24px; background-position:0 0,0 12px,12px -12px,-12px 0; }
    .image-stage { position:relative; display:grid; min-width:100%; min-height:100%; align-items:start; justify-items:center; padding:14px; }
    .image-stage img { display:block; width:var(--img-width); max-width:none; height:auto; border:1px solid rgba(24,32,47,.18); background:#fff; }
    .sync-source { cursor:crosshair; }
    .sync-dot { position:absolute; z-index:3; width:5px; height:5px; pointer-events:none; transform:translate(-50%,-50%); border:1px solid rgba(255,255,255,.72); border-radius:999px; background:rgba(210,28,28,.54); box-shadow:0 0 0 1px rgba(210,28,28,.18); opacity:0; }
    .sync-dot.visible { opacity:.72; }
    .info { display:grid; gap:6px; padding:10px 12px; border-top:1px solid var(--border); color:var(--muted); font-size:12px; line-height:1.35; }
    .path { overflow:hidden; white-space:nowrap; text-overflow:ellipsis; font-family:Consolas,Monaco,monospace; }
    .error { display:none; margin:14px; padding:10px 12px; border:1px solid #f0b6b6; border-radius:6px; background:#fff4f4; color:#9b2525; font-size:13px; }
    .error.visible { display:block; }
    @media (max-width:1100px) { header { align-items:flex-start; flex-direction:column; } .toolbar { width:100%; justify-content:flex-start; } .main { height:auto; grid-template-columns:1fr; } .pane { min-height:72vh; } }
  </style>
</head>

<header>

    <label>样本 <select id="sampleSelect"></select></label>
    <button id="zoomOut" type="button">-</button>
    <button id="zoomReset" type="button">100%</button>
    <button id="zoomIn" type="button">+</button>
  </div>
</header>
<main class="main">
  <section class="pane"><div class="pane-head"><div class="pane-title" id="originalTitle">BMP 原图</div><div class="badge">Original</div></div><div class="image-wrap"><div class="image-stage"><img id="originalImage" class="sync-source" src="" alt="原图"><span class="sync-dot" data-dot="original"></span><div class="error" id="originalError">原图加载失败</div></div></div><div class="info"><div class="path" id="originalPath"></div></div></section>
  <section class="pane"><div class="pane-head"><div class="pane-title" id="samTitle">SAM split9 upscale 初始结果</div><div class="badge">SAM</div></div><div class="image-wrap"><div class="image-stage"><img id="samImage" class="sync-source" src="" alt="SAM overlay"><span class="sync-dot" data-dot="sam"></span><div class="error" id="samError">SAM overlay 加载失败</div></div></div><div class="info"><div class="path" id="samPath"></div></div></section>
  <section class="pane"><div class="pane-head"><div class="pane-title" id="finalTitle">CNN v4.1 scale-aware t0.75 overlay</div><div class="badge">V4.1</div></div><div class="image-wrap"><div class="image-stage"><img id="finalImage" class="sync-source" src="" alt="v4.1 overlay"><span class="sync-dot" data-dot="final"></span><div class="error" id="finalError">v4.1 overlay 加载失败</div></div></div><div class="info"><div id="sampleStats"></div><div class="path" id="finalPath"></div></div></section>

const state = { sample:samples[0], zoom:1 };
const imageIds = ['original','sam','final'];
function $(id){ return document.getElementById(id); }
function init(){
  const sel=$('sampleSelect');
  for(const s of samples){ const o=document.createElement('option'); o.value=s.id; o.textContent=s.label; sel.appendChild(o); }
  sel.addEventListener('change',()=>{ state.sample=samples.find(x=>x.id===sel.value)||samples[0]; render(); });
  $('zoomOut').onclick=()=>setZoom(state.zoom/1.25); $('zoomIn').onclick=()=>setZoom(state.zoom*1.25); $('zoomReset').onclick=()=>setZoom(1);
  for(const id of imageIds){ const img=$(id+'Image'); img.addEventListener('mousemove', e=>syncMove(e,img)); img.addEventListener('mouseleave', hideDots); img.onerror=()=>$(id+'Error').classList.add('visible'); img.onload=()=>$(id+'Error').classList.remove('visible'); }
  render(); setZoom(1);
}
function render(){
  const s=state.sample;
  $('originalTitle').textContent=`BMP 原图 - ${s.label}`; $('samTitle').textContent=`SAM split9 upscale - ${s.label}`; $('finalTitle').textContent=`CNN v4.1 t0.75 - ${s.label}`;
  setImage('original', s.original); setImage('sam', s.sam); setImage('final', s.final);
  $('sampleStats').textContent=`SAM masks: ${s.predictions || '-'} / kept: ${s.kept || '-'} / balls: ${s.equivalent_ball_count || '-'} / area: ${s.ball_union_area || '-'} px (${s.ball_union_area_percent || '-'}%)`;
}
function setImage(id, src){ $(id+'Image').src=src; $(id+'Path').textContent=src; $(id+'Error').classList.remove('visible'); }
function setZoom(z){ state.zoom=Math.max(.5,Math.min(8,z)); document.documentElement.style.setProperty('--img-width', `${Math.round(state.zoom*100)}%`); $('zoomReset').textContent=`${Math.round(state.zoom*100)}%`; }
function syncMove(e, sourceImg){
  const rect=sourceImg.getBoundingClientRect(); const rx=(e.clientX-rect.left)/rect.width; const ry=(e.clientY-rect.top)/rect.height;
  if(rx<0||ry<0||rx>1||ry>1){ hideDots(); return; }
  for(const id of imageIds){ const img=$(id+'Image'); const dot=document.querySelector(`[data-dot="${id}"]`); if(!img || !dot || !img.complete) continue; dot.style.left=`${img.offsetLeft + rx*img.clientWidth}px`; dot.style.top=`${img.offsetTop + ry*img.clientHeight}px`; dot.classList.add('visible'); }
}
function hideDots(){ document.querySelectorAll('.sync-dot').forEach(x=>x.classList.remove('visible')); }
init();
