<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新膜照片小球分割结果查看器</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --panel-border: #d9e0ec;
      --text: #18202f;
      --muted: #657086;
      --accent: #1769e0;
      --accent-soft: #e8f1ff;
      --shadow: 0 8px 22px rgba(24, 32, 47, 0.08);
      --img-width: 100%;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 64px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    h1 { margin: 0; font-size: 18px; font-weight: 700; letter-spacing: 0; }
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }
    .toolbar label { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--muted); }
    select, button {
      height: 34px;
      border: 1px solid var(--panel-border);
      border-radius: 6px;
      background: #fff;
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }
    select { min-width: 310px; padding: 0 34px 0 10px; }
    button { min-width: 38px; padding: 0 10px; cursor: pointer; }
    button:hover, select:hover { border-color: #8fb6ee; }
    .main {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      height: calc(100vh - 64px);
      padding: 12px;
    }
    .pane {
      display: flex;
      min-width: 0;
      min-height: 0;
      flex-direction: column;
      overflow: hidden;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }
    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 48px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--panel-border);
    }
    .pane-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 14px;
      font-weight: 700;
    }
    .badge {
      flex: 0 0 auto;
      padding: 4px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }
    .image-wrap {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(45deg, #f0f3f8 25%, transparent 25%),
        linear-gradient(-45deg, #f0f3f8 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f0f3f8 75%),
        linear-gradient(-45deg, transparent 75%, #f0f3f8 75%);
      background-size: 24px 24px;
      background-position: 0 0, 0 12px, 12px -12px, -12px 0;
    }
    .image-stage {
      position: relative;
      display: grid;
      min-width: 100%;
      min-height: 100%;
      align-items: start;
      justify-items: center;
      padding: 14px;
    }
    .image-stage img {
      display: block;
      width: var(--img-width);
      max-width: none;
      height: auto;
      border: 1px solid rgba(24, 32, 47, 0.18);
      background: #fff;
    }
    .sync-source { cursor: crosshair; }
    .sync-dot {
      position: absolute;
      z-index: 3;
      width: 5px;
      height: 5px;
      pointer-events: none;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255,255,255,0.75);
      border-radius: 999px;
      background: rgba(210, 28, 28, 0.58);
      box-shadow: 0 0 0 1px rgba(210, 28, 28, 0.18);
      opacity: 0;
    }
    .sync-dot.visible { opacity: 0.76; }
    .info {
      display: grid;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid var(--panel-border);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }
    .path {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-family: Consolas, Monaco, monospace;
    }
    .image-error {
      display: none;
      margin: 14px;
      padding: 10px 12px;
      border: 1px solid #f0b6b6;
      border-radius: 6px;
      background: #fff4f4;
      color: #9b2525;
      font-size: 13px;
      line-height: 1.4;
    }
    .image-error.visible { display: block; }
    @media (max-width: 1100px) {
      header { align-items: flex-start; flex-direction: column; }
      .toolbar { width: 100%; justify-content: flex-start; }
      select { min-width: min(100%, 310px); }
      .main { height: auto; grid-template-columns: 1fr; }
      .pane { min-height: 72vh; }
    }
  </style>
</head>
<body>
  <header>
    <h1>新膜照片小球分割结果查看器</h1>
    <div class="toolbar">
      <label>样本 <select id="sampleSelect" aria-label="选择样本"></select></label>
      <button id="zoomOut" type="button" title="缩小">-</button>
      <button id="zoomReset" type="button" title="重置缩放">100%</button>
      <button id="zoomIn" type="button" title="放大">+</button>
    </div>
  </header>

  <main class="main">
    <section class="pane">
      <div class="pane-head"><div class="pane-title" id="originalTitle">BMP 原图</div><div class="badge">Original</div></div>
      <div class="image-wrap"><div class="image-stage">
        <img id="originalImage" class="sync-source" data-sync-panel="original" src="" alt="BMP 原图">
        <span class="sync-dot" data-sync-dot="original" aria-hidden="true"></span>
        <div class="image-error" id="originalError">原图加载失败，请确认文件存在。</div>
      </div></div>
      <div class="info"><div class="path" id="originalPath"></div></div>
    </section>

    <section class="pane">
      <div class="pane-head"><div class="pane-title" id="samTitle">SAM split36 upscale 初始结果</div><div class="badge">SAM</div></div>
      <div class="image-wrap"><div class="image-stage">
        <img id="samImage" class="sync-source" data-sync-panel="sam" src="" alt="SAM 初始 overlay">
        <span class="sync-dot" data-sync-dot="sam" aria-hidden="true"></span>
        <div class="image-error" id="samError">SAM 初始结果加载失败，请确认文件存在。</div>
      </div></div>
      <div class="info"><div class="path" id="samPath"></div></div>
    </section>

    <section class="pane">
      <div class="pane-head"><div class="pane-title" id="finalTitle">CNN v3 t0.75 最终 overlay</div><div class="badge" id="finalBadge">Final</div></div>
      <div class="image-wrap"><div class="image-stage">
        <img id="finalImage" class="sync-source" data-sync-panel="final" src="" alt="最终 overlay">
        <span class="sync-dot" data-sync-dot="final" aria-hidden="true"></span>
        <div class="image-error" id="finalError">最终 overlay 加载失败，请确认文件存在。</div>
      </div></div>
      <div class="info">
        <div id="sampleStats"></div>
        <div class="path" id="finalPath"></div>
      </div>
    </section>
  </main>

    const root = document.documentElement;
    const sampleSelect = document.getElementById("sampleSelect");
    let zoom = 100;

    for (const sample of samples) {
      const option = document.createElement("option");
      option.value = sample.id;
      option.textContent = sample.label;
      sampleSelect.appendChild(option);
    }

    function setImage(imgId, errorId, src, alt) {
      const img = document.getElementById(imgId);
      const err = document.getElementById(errorId);
      err.classList.remove("visible");
      img.src = src;
      img.alt = alt;
    }

    function setSample(id) {
      const sample = samples.find((item) => item.id === id) || samples[0];
      sampleSelect.value = sample.id;
      document.getElementById("originalTitle").textContent = `${sample.label} 原图`;
      document.getElementById("samTitle").textContent = `${sample.label} SAM 初始结果`;
      document.getElementById("finalTitle").textContent = `${sample.label} 最终 overlay`;
      document.getElementById("finalBadge").textContent = `${sample.kept} kept`;
      document.getElementById("sampleStats").textContent = `SAM masks=${sample.masks}，kept=${sample.kept}，rejected=${sample.rejected}，area_rejected=${sample.areaRejected}`;
      document.getElementById("originalPath").textContent = sample.original.replace("../", "");
      document.getElementById("samPath").textContent = sample.sam.replace("../", "");
      document.getElementById("finalPath").textContent = sample.final.replace("../", "");
      setImage("originalImage", "originalError", sample.original, `${sample.label} 原图`);
      setImage("samImage", "samError", sample.sam, `${sample.label} SAM 初始结果`);
      setImage("finalImage", "finalError", sample.final, `${sample.label} 最终 overlay`);
      hideSyncDots();
    }

    function applyZoom() {
      root.style.setProperty("--img-width", `${zoom}%`);
      document.getElementById("zoomReset").textContent = `${zoom}%`;
    }

    function getSyncItems() {
      return Array.from(document.querySelectorAll(".sync-source")).map((img) => ({
        img,
        panel: img.dataset.syncPanel,
        dot: document.querySelector(`[data-sync-dot="${img.dataset.syncPanel}"]`),
        wrap: img.closest(".image-wrap")
      }));
    }

    function hideSyncDots() {
      for (const item of getSyncItems()) item.dot.classList.remove("visible");
    }

    function placeSyncDot(item, nx, ny, visible) {
      const left = item.img.offsetLeft + nx * item.img.clientWidth;
      const top = item.img.offsetTop + ny * item.img.clientHeight;
      item.dot.style.left = `${left}px`;
      item.dot.style.top = `${top}px`;
      item.dot.classList.toggle("visible", visible);
    }

    function centerSyncPoint(item, nx, ny) {
      const targetX = item.img.offsetLeft + nx * item.img.clientWidth;
      const targetY = item.img.offsetTop + ny * item.img.clientHeight;
      item.wrap.scrollLeft = Math.max(0, targetX - item.wrap.clientWidth / 2);
      item.wrap.scrollTop = Math.max(0, targetY - item.wrap.clientHeight / 2);
    }

    function handleSyncMove(event) {
      const sourceImg = event.currentTarget;
      const rect = sourceImg.getBoundingClientRect();
      const nx = Math.min(1, Math.max(0, (event.clientX - rect.left) / rect.width));
      const ny = Math.min(1, Math.max(0, (event.clientY - rect.top) / rect.height));
      for (const item of getSyncItems()) {
        const isTarget = item.img !== sourceImg;
        placeSyncDot(item, nx, ny, isTarget);
        if (isTarget) centerSyncPoint(item, nx, ny);
      }
    }

    for (const img of document.querySelectorAll(".sync-source")) {
      img.addEventListener("pointermove", handleSyncMove);
      img.addEventListener("pointerleave", hideSyncDots);
      img.addEventListener("error", () => document.getElementById(`${img.dataset.syncPanel}Error`).classList.add("visible"));
      img.addEventListener("load", () => document.getElementById(`${img.dataset.syncPanel}Error`).classList.remove("visible"));
    }

    sampleSelect.addEventListener("change", () => setSample(sampleSelect.value));
    document.getElementById("zoomOut").addEventListener("click", () => { zoom = Math.max(35, zoom - 15); applyZoom(); });
    document.getElementById("zoomIn").addEventListener("click", () => { zoom = Math.min(300, zoom + 15); applyZoom(); });
    document.getElementById("zoomReset").addEventListener("click", () => { zoom = 100; applyZoom(); });

    setSample(samples[0].id);
    applyZoom();
  </script>
</body>
</html>
